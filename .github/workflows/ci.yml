name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: gofmt
        run: |
          drift=$(gofmt -l .)
          if [ -n "$drift" ]; then
            echo "gofmt drift detected in:"
            echo "$drift"
            echo "Run 'gofmt -w .' locally to fix."
            exit 1
          fi
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./...
  # Unit tests for the SPA's pure JS logic (Node's built-in test runner,
  # no npm dependencies). OS-independent, so one runner is enough.
  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: npm test
